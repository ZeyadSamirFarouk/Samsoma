        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling while curtain is closed */
            background: radial-gradient(circle at center, #2a0815 0%, #0a0005 100%);
            color: white;
            min-height: 100vh;
        }

        /* --- Royal Curtain Styles --- */
        #theater-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: flex;
            pointer-events: none;
            overflow: hidden;

        /* Texture for realistic velvet folds */
        .velvet-texture {
            background-color: var(--velvet-red);

                rgba(255,255,255,0.15) 20%,

                rgba(255,255,255,0.1) 60%, 
                rgba(0,0,0,0.6) 80%,

        .curtain-valance {

            left: 0;

                rgba(255,255,255,0.15) 50%,
                rgba(0,0,0,0.6) 60%,

                rgba(255,255,255,0.15) 90%, 
                rgba(0,0,0,0.6) 100%
            );
            background-size: 10vw 100%;
            border-bottom: 15px solid var(--gold-main);

            border-image: linear-gradient(to right, var(--gold-dark), var(--gold-light), var(--gold-main), var(--gold-light), var(--gold-dark)) 1;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 95% 85%, 90% 100%, 85% 85%, 80% 100%, 75% 85%, 70% 100%, 65% 85%, 60% 100%, 55% 85%, 50% 100%, 45% 85%, 40% 100%, 35% 85%, 30% 100%, 25% 85%, 20% 100%, 15% 85%, 10% 100%, 5% 85%, 0% 100%);
            animation: raiseValance 3.5s cubic-bezier(0.64, 0, 0.05, 1) 1.5s forwards;
        }

        /* Animations for opening */
        @keyframes openCurtainLeft {
            0% { transform: translateX(0) scaleX(1); }
            50% { transform: translateX(-40%) scaleX(0.7) skewX(-5deg); }
            100% { transform: translateX(-110%) scaleX(0.2) skewX(0); display: none; }
        }

        @keyframes openCurtainRight {
            0% { transform: translateX(0) scaleX(1); }
            50% { transform: translateX(40%) scaleX(0.7) skewX(5deg); }
            100% { transform: translateX(110%) scaleX(0.2) skewX(0); display: none; }
        }

        @keyframes raiseValance {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); display: none; }
        }

        /* --- Main Content Styles --- */
        .glass-panel {
            background: rgba(20, 0, 10, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(191, 149, 63, 0.3);

        }

        .gold-text {
            background: linear-gradient(to right, var(--gold-dark), var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(191, 149, 63, 0.4);
        }

        .ruqaa-font {
            font-family: 'Aref Ruqaa', serif;
        }

        /* Floating Animation for whole card */
        .float-card {
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Hearts */
        .heart {
            position: absolute;
            bottom: -10%;
            animation: floatUp linear infinite;
            opacity: 0.8;
            z-index: 0;
            filter: drop-shadow(0 0 10px rgba(255, 0, 100, 0.5));
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        /* Revealing main content */
        #main-content {
            opacity: 0;
            transform: scale(0.9);
            animation: revealContent 2s ease-out 3s forwards;
        }

        @keyframes revealContent {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

    <script>
        // --- Prevent body scroll until animation finishes ---
        setTimeout(() => {
            document.body.style.overflow = 'auto';
            document.getElementById('theater-curtain').remove(); // completely remove to free memory and interactions
        }, 5000);

        // --- Countdown Logic ---
        // Target: April 28, 2026, 00:00:00
        const targetDate = new Date("April 28, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // --- Premium Floating Elements ---
        const heartsContainer = document.getElementById('hearts-container');
        const elements = ['❤️', '✨', '💖', '🌟', '💕'];

        function createMagic() {
            const el = document.createElement('div');
            el.classList.add('heart');
            el.innerText = elements[Math.floor(Math.random() * elements.length)];
            
            // Random properties for natural look
            el.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 2 + 1.5;
            el.style.fontSize = size + 'rem';
            
            const duration = Math.random() * 6 + 6; // 6s to 12s
            el.style.animationDuration = duration + 's';

            heartsContainer.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, duration * 1000);
        }

        // Generate magic every 300ms
        setInterval(createMagic, 300);
    </script>
